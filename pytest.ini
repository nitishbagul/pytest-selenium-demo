[pytest]
# Where pytest looks for tests
testpaths = tests

# Test discovery patterns (defaults shown for clarity)
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default CLI options applied to every run
addopts =
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html

# Custom markers — anything you'll filter on with `-m`
markers =
    smoke: quick sanity tests (run on every PR)
    regression: full regression suite
    login: tests covering the login flow
    checkout: tests covering checkout
